<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- backdrop -->
  <rect x="4" y="4" width="92" height="92" rx="22" fill="#0f1418" stroke="#243240" stroke-width="2"/>
  <!-- dispatch fan: one origin broadcasting to many destinations -->
  <g stroke="#3b9eff" stroke-width="8" stroke-linecap="round" fill="none">
    <line x1="31" y1="50" x2="71" y2="27"/>
    <line x1="31" y1="50" x2="77" y2="50"/>
    <line x1="31" y1="50" x2="71" y2="73"/>
  </g>
  <g fill="#3b9eff">
    <circle cx="71" cy="27" r="8"/>
    <circle cx="77" cy="50" r="8"/>
    <circle cx="71" cy="73" r="8"/>
  </g>
  <!-- origin node, brighter -->
  <circle cx="31" cy="50" r="12" fill="#7dc3ff"/>
  <circle cx="31" cy="50" r="5.5" fill="#0f1418"/>
</svg>
