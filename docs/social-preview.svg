<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
  <defs>
    <radialGradient id="bg" cx="32%" cy="38%" r="85%">
      <stop offset="0%" stop-color="#15171c"/>
      <stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- canvas -->
  <rect width="1280" height="640" fill="#0b0b0d"/>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect x="8" y="8" width="1264" height="624" rx="20" fill="none" stroke="#26262d" stroke-width="2"/>

  <!-- ── left: wordmark + headline ───────────────────────────────────── -->
  <g transform="translate(80,96)">
    <text x="0" y="0" font-size="22" fill="#8b8b95" letter-spacing="1">
      <tspan fill="#4ade80">⏚</tspan>  open-dispatch
    </text>

    <text x="-2" y="120" font-size="92" font-weight="700" fill="#e6e6e8" letter-spacing="-3">One API.</text>
    <text x="-2" y="218" font-size="92" font-weight="700" letter-spacing="-3" fill="url(#accent)">Every platform.</text>

    <text x="0" y="290" font-size="27" fill="#a9a9b3" letter-spacing="0.3">Self-hosted social dispatch — open-source,</text>
    <text x="0" y="328" font-size="27" fill="#a9a9b3" letter-spacing="0.3">MIT, and free forever.</text>

    <!-- platform chips -->
    <g transform="translate(0,378)" font-size="18" fill="#8b8b95">
      <rect x="0"   y="0" width="116" height="38" rx="8" fill="#141418" stroke="#26262d"/>
      <text x="58"  y="25" text-anchor="middle">Twitter</text>
      <rect x="128" y="0" width="116" height="38" rx="8" fill="#141418" stroke="#26262d"/>
      <text x="186" y="25" text-anchor="middle">Bluesky</text>
      <rect x="256" y="0" width="132" height="38" rx="8" fill="#141418" stroke="#26262d"/>
      <text x="322" y="25" text-anchor="middle">Instagram</text>
      <rect x="400" y="0" width="124" height="38" rx="8" fill="#141418" stroke="#26262d"/>
      <text x="462" y="25" text-anchor="middle">Telegram</text>
    </g>
    <g transform="translate(0,424)" font-size="18" fill="#8b8b95">
      <rect x="0"   y="0" width="124" height="38" rx="8" fill="#141418" stroke="#26262d"/>
      <text x="62"  y="25" text-anchor="middle">LinkedIn</text>
      <rect x="136" y="0" width="116" height="38" rx="8" fill="#141418" stroke="#26262d"/>
      <text x="194" y="25" text-anchor="middle">Threads</text>
      <rect x="264" y="0" width="148" height="38" rx="8" fill="#141418" stroke="#26262d"/>
      <text x="338" y="25" text-anchor="middle">YouTube</text>
    </g>
  </g>

  <!-- ── right: hub-and-spokes dispatch glyph ─────────────────────────── -->
  <g transform="translate(980,320)" stroke-linecap="round">
    <!-- spokes to 7 destination nodes -->
    <g stroke="#4ade80" stroke-width="3" opacity="0.55">
      <line x1="0" y1="0" x2="150" y2="-150"/>
      <line x1="0" y1="0" x2="205" y2="-58"/>
      <line x1="0" y1="0" x2="205" y2="58"/>
      <line x1="0" y1="0" x2="150" y2="150"/>
      <line x1="0" y1="0" x2="-150" y2="-150"/>
      <line x1="0" y1="0" x2="-205" y2="0"/>
      <line x1="0" y1="0" x2="-150" y2="150"/>
    </g>
    <!-- destination nodes -->
    <g fill="#4ade80">
      <circle cx="150"  cy="-150" r="13"/>
      <circle cx="205"  cy="-58"  r="13"/>
      <circle cx="205"  cy="58"   r="13"/>
      <circle cx="150"  cy="150"  r="13"/>
      <circle cx="-150" cy="-150" r="13"/>
      <circle cx="-205" cy="0"    r="13"/>
      <circle cx="-150" cy="150"  r="13"/>
    </g>
    <!-- origin hub -->
    <circle cx="0" cy="0" r="40" fill="#0b0b0d" stroke="url(#accent)" stroke-width="6" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="14" fill="url(#accent)"/>
  </g>

  <!-- ── footer strip ─────────────────────────────────────────────────── -->
  <g transform="translate(80,576)" font-size="20">
    <text x="0" y="0" fill="#4ade80">$ docker compose up -d</text>
    <text x="360" y="0" fill="#8b8b95">·  one command  ·  7 platforms  ·  $0 forever</text>
  </g>
</svg>
