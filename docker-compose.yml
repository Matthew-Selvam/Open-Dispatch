services:
  api:
    build: .
    container_name: open-dispatch-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    command: ["uvicorn", "api.app:app", "--host", "0.0.0.0", "--port", "8000"]
    # No `depends_on: redis` — Redis is opt-in via REDIS_URL.

  worker:
    build: .
    container_name: open-dispatch-worker
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/data
    depends_on:
      - api
    command: ["python", "-m", "scheduler.worker"]

  # Optional — only used when REDIS_URL points here in .env.
  # Comment out if you want pure JSONL self-host.
  redis:
    image: redis:7-alpine
    container_name: open-dispatch-redis
    restart: unless-stopped
    profiles: ["redis"]
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    command: ["redis-server", "--appendonly", "yes"]
